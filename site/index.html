<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Register</title>
  <style>
    :root {
      --green-dark: #1a4a2e;
      --green-main: #2d6a4f;
      --green-mid:  #3a7d5a;
      --green-light:#4caf80;
      --gold:       #c9a227;
      --gold-light: #e8c04a;
      --gold-pale:  #fdf3d0;
      --white:      #ffffff;
      --off-white:  #f8f7f3;
      --gray-light: #eeecea;
      --gray-mid:   #b0ada8;
      --gray-text:  #4a4845;
      --shadow-sm:  0 2px 8px rgba(55, 70, 61, 0.08);
      --shadow-md:  0 6px 24px rgba(26,74,46,0.12);
      --shadow-lg:  0 16px 48px rgba(26,74,46,0.16);
      --radius:     12px;
      --radius-lg:  20px;
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-main) 50%, var(--green-mid) 100%);
      padding: 20px;
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

  
    .auth-header {
      background: linear-gradient(135deg, var(--green-main), var(--green-dark));
      padding: 32px 40px;
      text-align: center;
      position: relative;
    }

    .auth-header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
    }

    .logo {
      width: 60px;
      height: 60px;
      background: var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 4px 16px rgba(201, 162, 39, 0.4);
    }

    .logo svg {
      width: 32px;
      height: 32px;
      fill: var(--green-dark);
    }

    .auth-header h1 {
      color: var(--white);
      font-size: 24px;
      font-weight: 600;
    }

    .tab-container {
      display: flex;
      background: var(--gray-light);
    }

    .tab {
      flex: 1;
      padding: 16px;
      border: none;
      background: transparent;
      font-size: 15px;
      font-weight: 600;
      color: var(--gray-mid);
      cursor: pointer;
      transition: var(--transition);
      position: relative;
    }

    .tab.active {
      color: var(--green-main);
      background: var(--white);
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 20%;
      right: 20%;
      height: 3px;
      background: var(--gold);
      border-radius: 3px 3px 0 0;
    }

    .tab:hover:not(.active) {
      color: var(--gray-text);
    }

   
    .form-container {
      padding: 32px 40px 40px;
    }

    .form {
      display: none;
    }

    .form.active {
      display: block;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--gray-text);
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--gray-light);
      border-radius: var(--radius);
      font-size: 15px;
      color: var(--gray-text);
      transition: var(--transition);
      background: var(--off-white);
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--green-light);
      background: var(--white);
      box-shadow: 0 0 0 4px rgba(76, 175, 128, 0.1);
    }

    .form-group input::placeholder {
      color: var(--gray-mid);
    }


    .btn-submit {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--green-dark);
      box-shadow: 0 4px 16px rgba(201, 162, 39, 0.3);
      margin-top: 8px;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(201, 162, 39, 0.4);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

   
    .form-extras {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--gray-text);
    }

    .remember-me input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--green-main);
      cursor: pointer;
    }

    .forgot-link {
      color: var(--green-main);
      text-decoration: none;
      font-weight: 500;
    }

    .forgot-link:hover {
      color: var(--gold);
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: var(--gray-mid);
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray-light);
    }

    .divider span {
      padding: 0 16px;
    }

    /* Social Buttons */
    .social-btn {
      width: 100%;
      padding: 14px;
      border: 2px solid var(--gray-light);
      border-radius: var(--radius);
      background: var(--white);
      font-size: 14px;
      font-weight: 500;
      color: var(--gray-text);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .social-btn:hover {
      border-color: var(--green-light);
      background: var(--off-white);
    }

    .social-btn svg {
      width: 20px;
      height: 20px;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-header">
      <div class="logo">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      </div>
      <h1>Welcome</h1>
    </div>

    <div class="tab-container">
      <button class="tab active" data-tab="login">Login</button>
      <button class="tab" data-tab="register">Register</button>
    </div>

    <div class="form-container">
      <!-- Login Form -->
      <form class="form active" id="login">
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Enter your password" required>
        </div>
        <div class="form-extras">
          <label class="remember-me">
            <input type="checkbox"> Remember me
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <!-- LOGIN BUTTON -->
<a href="index1.html">
  <button type="button" class="btn-submit">
    Sign In
  </button>
</a>
        <div class="divider"><span>or continue with</span></div>
        <button type="button" class="social-btn">
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>
      </form>

      <!-- Register Form -->
      <form class="form" id="register">
        <div class="form-group">
          <label for="reg-name">Full Name</label>
          <input type="text" id="reg-name" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label for="reg-email">Email Address</label>
          <input type="email" id="reg-email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" placeholder="Create a password" required>
        </div>
        <div class="form-group">
          <label for="reg-confirm">Confirm Password</label>
          <input type="password" id="reg-confirm" placeholder="Confirm your password" required>
        </div>
        <button type="submit" class="btn-submit">Create Account</button>
        <div class="divider"><span>or continue with</span></div>
        <button type="button" class="social-btn">
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>
      </form>
    </div>
  </div>

  <script>
    const tabs = document.querySelectorAll('.tab');
    const forms = document.querySelectorAll('.form');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        forms.forEach(f => f.classList.remove('active'));
        
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab).classList.add('active');
      });
    });
  </script>
</body>
</html>
