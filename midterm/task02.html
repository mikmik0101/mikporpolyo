<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Using CSS Positions</title>
<style>
body{
font-family: Arial, Helvetica, sans-serif;
height: 3000px;
}
#button{
height: 50px;
width: 50px;
border-radius: 25px;
background-color: black;
color: white;
font-size: large;
margin-left: 1275px;
position: absolute;
}
#box{
width: 320px;
height: 180px;
border: none;
background-color: rgb(85, 80, 80);
position: fixed;
margin-left: 1010px;
margin-top:420px;
}
img{
position: relative;
height: 270px;
width: 200px;
}
.off{
position: absolute;
top: 15px;
left: 138px;
display: inline-block;
border: none;
background-color: black;
color: white;
height: 28px;
width: 70px;
font-size: 11px;
text-align: center;
}
.atc-container{
position: absolute;
top: 195px;
left: 8px;
background-color: #ffffff9f;
height: 85px;
width: 230px;
}
.atc{
position: relative;
top: 30px;
left: 55px;
border: 1px solid black;
background-color: white;
height: 25px;
width: 80px;
font-size: 10px;
cursor: pointer;
}
.atc:hover{
color: gray;
}
</style>
</head>
<body>
<div>
<nav>
<button id="button">X</button>
</nav>
</div>
<div id="box"></div>
<div id="main-container">
<div class="clothe">
<img src="https://i.ibb.co/PsCBNPRX/6264913042441178698.jpg"
alt="clothe" border="0"></a>
<div class="off"><p>20% OFF</p></div>
<div class="atc-container">
<button class="atc">Add to Cart</button></div>
</div>
</div>
</body>
</html>
